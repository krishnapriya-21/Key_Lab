<!-- Typing-Game  -->

<!Doctype HTML>

<html>

<head>
    <title>Typing-Game</title>

    <meta charset="utf-8">
    <meta name="viewport"  content="width=device-width, initial-scale= 1.0 viewport-fit=cover">
    <meta name="description" content=" Typing-Game to calculate time taken to complete a sentence">
    

    <link rel="stylesheet" href="./styles.css">
  
</head>




<body>
    
    
    <div class="Container">
        <h1 class="main-title">Typing Game</h1>

        <div class="sub-title">
            <h2 id="sub" >Let's Practice Typing!</h2>
            <h3 id="sub" >Once You Are Ready Click The BUTTON, Type As Much As You Can.</h3>
        </div>

        
        <div class="sentence-container">
            <button id="button">Give Me A Sentence</button>
            <p id="sentence" class="new-text">type This Content!</p>
            
       </div>
        
        <div class="result-container">
            <p id="CongratsMsg"></p>
            <p id="TimeInfo"></p>
        </div>
        <div class="ip">
        <input type="text"  id="TypingBox" class="TextBox" placeholder="Start Typing Here...">
       </div>
    </div>

    <script src="./script.js"></script>

</body>


</html>
